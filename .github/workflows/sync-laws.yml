name: Sync Law PDFs

on:
  push:
    paths:
      - 'data/laws/**'
  schedule:
    - cron: '0 2 * * *'   # Daily at 02:00 UTC

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Pull latest laws to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/ai-arch-assistant
            git clean -fd data/laws/
            git pull origin master

      - name: Trigger sync endpoint
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          BODY='{}'
          SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')"
          curl -f -X POST "$DEPLOY_URL/rag/sync" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$BODY"
