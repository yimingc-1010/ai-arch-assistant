server {
    listen 80;
    server_name _;

    # SSE: disable buffering globally for this server
    proxy_buffering off;

    # FastAPI: RAG endpoints (ingest / query / documents)
    location /rag/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE: keep connection open
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # FastAPI: admin endpoints (ingest PDF, crawl tasks)
    location /admin/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # FastAPI: health check
    location /health {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Next.js lawchat (catch-all)
    location / {
        proxy_pass         http://lawchat:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # SSE: keep connection open
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
