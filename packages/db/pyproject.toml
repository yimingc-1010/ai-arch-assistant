[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autocrawler-db"
version = "0.1.0"
description = "Database/storage layer for autocrawler"
requires-python = ">=3.10"
dependencies = [
    "autocrawler-shared",
    "sqlalchemy>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "alembic>=1.12.0",
]

[tool.setuptools.packages.find]
where = ["src"]
