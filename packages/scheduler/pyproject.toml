[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autocrawler-scheduler"
version = "0.1.0"
description = "Background job scheduler for autocrawler"
requires-python = ">=3.10"
dependencies = [
    "autocrawler-core",
    "autocrawler-db",
    "apscheduler>=3.10.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0"]

[tool.setuptools.packages.find]
where = ["src"]
