[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "lawrag"
version = "0.1.0"
description = "Law regulation PDF RAG system with ChromaDB and Voyage AI / Claude"
requires-python = ">=3.10"
dependencies = [
    "pdfplumber>=0.10.0",
    "chromadb>=0.5.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.25.0", "voyageai>=0.2.3"]
openai = ["openai>=1.20.0"]
all = ["anthropic>=0.25.0", "voyageai>=0.2.3", "openai>=1.20.0"]
dev = ["pytest>=7.0.0", "pytest-mock>=3.12.0"]

[project.scripts]
lawrag = "lawrag.cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]
