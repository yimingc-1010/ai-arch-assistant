[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autocrawler-law"
version = "0.1.0"
description = "Law-specific scraper plugin for autocrawler"
requires-python = ">=3.10"
dependencies = [
    "autocrawler-core",
    "requests>=2.28.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=4.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "responses>=0.23.0",
]

[tool.setuptools.packages.find]
where = ["src"]
