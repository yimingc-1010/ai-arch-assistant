services:

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file: .env
    environment:
      LAWRAG_CHROMA_DIR: /data/chroma
    volumes:
      - chroma_data:/data/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  lawchat:
    build:
      context: .
      dockerfile: docker/lawchat/Dockerfile
    environment:
      FASTAPI_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lawchat
    restart: unless-stopped

volumes:
  chroma_data:
